name: Build

# Branch policy:
#   - main     -> builds AUTOMATICALLY on every push (auto trigger).
#                 This is the tested/stable branch; only merge here after QA.
#   - july-dev -> builds ONLY when manually triggered (workflow_dispatch).
#                 Development happens here without auto-builds.
#
# How to manually trigger a july-dev build:
#   GitHub UI:  Actions tab -> "Build" -> "Run workflow" -> branch: july-dev
#   CLI:        gh workflow run build.yml --repo LCorleone/screenshot -r july-dev
on:
  push:
    branches: [main, master]
  workflow_dispatch: # manual trigger from any branch (used for july-dev)

jobs:
  build-windows:
    name: Build (Windows, ${{ github.ref_name }})
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release --locked
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          # Include the branch name so dev vs main artifacts don't collide.
          name: screenshot-dai-windows-${{ github.ref_name }}
          path: target/release/screenshot-dai.exe
          if-no-files-found: error

  check-linux:
    name: Check (Linux, ${{ github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libxi-dev libxrandr-dev libxss-dev libxtst-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libgl1-mesa-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libgbm-dev libxkbcommon-dev
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --locked
