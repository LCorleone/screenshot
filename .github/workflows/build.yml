name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release --locked
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-dai-windows
          path: target/release/screenshot-dai.exe
          if-no-files-found: error

  check-linux:
    name: Check (Linux, fast feedback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libxi-dev libxrandr-dev libxss-dev libxtst-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libgl1-mesa-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libgbm-dev libxkbcommon-dev
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --locked
